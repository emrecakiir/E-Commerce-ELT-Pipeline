

services:
  db:
    image: postgres:15
    container_name: olist_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  streamlit-app:
    build: .
    container_name: olist_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - db